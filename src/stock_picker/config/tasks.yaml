find_trending_companies:
  description: >
    Find the top trending companies in the news in {sector} in the Indian stock market by searching the latest news.
    IMPORTANT: Only use news and information from the last 1 month. Do not use any data older than 1 month.
    Focus on companies listed on NSE (National Stock Exchange) or BSE (Bombay Stock Exchange).
    When searching, include location context (e.g., "Indian stock market", "India companies", "NSE", "BSE") and date filters to ensure recent results.
    Find new companies that you've not found before.
  expected_output: >
    A list of trending companies in {sector} from Indian stock market
  agent: trending_company_finder
  output_file: output/trending_companies.json

research_trending_companies:
  description: >
    Given a list of trending companies from the Indian stock market, provide detailed analysis of each company in a report by searching online.
    IMPORTANT: Only use news, financial data, and information from the last 1 month. Do not use any data older than 1 month.
    Focus on companies in the Indian stock market and include location context in your searches (e.g., "Indian stock market", "NSE", "BSE").
    Ensure all financial data, market positions, and future outlooks are based on recent information only (within last 1 month).
  expected_output: >
    A report containing detailed analysis of each company with recent data (within last 1 month)
  agent: financial_researcher
  context:
    - find_trending_companies
  output_file: output/research_report.json

pick_best_company:
  description: >
    Analyze the research findings and pick the best company for investment.
    Send a push notification to the user with the decision and 1 sentence rationale.
    Then respond with a detailed report on why you chose this company, and which companies were not selected.
  expected_output: >
    The chosen company and why it was chosen; the companies that were not selected and why they were not selected.
  agent: stock_picker
  context:
    - research_trending_companies
  output_file: output/decision.md
